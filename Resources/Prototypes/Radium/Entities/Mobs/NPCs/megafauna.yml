- type: entity
  name: ash drake
  parent:
  - BaseSimpleMob
  - MobCombat
  - MobBloodstream
  id: MobAshDrake
  description: An unstoppable force of carnage.
  components:
  - type: GhostRole
    allowMovement: true
    makeSentient: true
    name: ghost-role-information-hellspawn-name
    description: ghost-role-information-hellspawn-description
    rules: ghost-role-information-antagonist-rules
    raffle:
      settings: default
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: GhostTakeoverAvailable
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: Body
    prototype: Animal
  - type: Damageable
    damageContainer: BiologicalMetaphysical
    damageModifierSet: HellSpawn
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3
  - type: Sprite
    sprite: Radium/Mobs/Megafauna/64x64megafauna.rsi
    layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: dragon
  - type: DamageStateVisuals
    states:
      Alive:
        Base: dragon
      Dead:
        Base: dragon_dead
  - type: NameIdentifier
    group: GenericNumber
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.7
      80: 0.5
  - type: MobPrice
    price: 1000 # Living critters are valuable in space.
  - type: Perishable
  # - type: Reflect
  #   reflectProb: 0.7
  #   reflects:
  #     - Energy
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.9
        density: 300
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobState
  - type: Tag
    tags:
      - CannotSuicide
      - DoorBumpOpener
      - FootstepSound
  - type: MobThresholds
    thresholds:
      0: Alive
      1450: Dead
  - type: Butcherable
    spawned:
      - id: ArtifactFragment
        amount: 4
  # - type: MeleeWeapon
  #   attackRate: 0.6
  #   hidden: true
  #   soundHit:
  #     path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
  #   damage:
  #     types:
  #       Blunt: 150
  #       Structural: 70
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: PointLight
    radius: 2
    energy: 4.5
    color: "#ff4242"
    castShadows: false
  - type: NPCUseActionOnTarget
    actionId: ActionAshDrakeLavajump
  - type: ActionGun
    action: ActionDragonsBreath
    gunProto: DragonsBreathGun
  - type: AshDrakeGun
    action: ActionDragonsConeBreath
    gunProto: DrakesShotgunBreathGun

#ACTIONS
- type: entity
  id: ActionAshDrakeLavajump
  name: "[color=red]Lava jump[/color]"
  description: Jump!
  components:
  - type: EntityWorldTargetAction
    raiseOnUser: true
    icon:
      sprite: Mobs/Aliens/Asteroid/goliath.rsi
      state: goliath_tentacle_spawn
    iconOn:
      sprite: Mobs/Aliens/Asteroid/goliath.rsi
      state: goliath_tentacle_wiggle
    sound:
      path: "/Audio/Animals/space_dragon_roar.ogg"
    event: !type:AshDrakeLavajumpAction
    useDelay: 30
    range: 10

- type: entity
  id: ActionDragonsConeBreath
  name: "[color=orange]Cone Dragon's Breath[/color]"
  description: Spew out flames at anyone foolish enough to attack you!
  components:
  - type: WorldTargetAction
    # TODO: actual sprite
    icon: { sprite : Objects/Weapons/Guns/Projectiles/magic.rsi, state: fireball }
    event: !type:AshDrakeGunShootEvent
    priority: 2
    checkCanAccess: false
    range: 0
    itemIconStyle: BigAction

#Guns
- type: entity
  categories: [ HideSpawnMenu ]
  id: DrakesBreathGun
  name: ash dragon's lung
  description: For ash drake's breathing.
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 5
    rechargeSound:
      path: /Audio/Animals/space_dragon_roar.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileDrakeBreath
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot:
      path: /Audio/Animals/space_dragon_roar.ogg
    soundEmpty: null
    projectileSpeed: 5

- type: entity
  parent: DrakesBreathGun
  categories: [ HideSpawnMenu ]
  id: DrakesShotgunBreathGun
  name: ash dragon's lung
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 5
    rechargeSound:
      path: /Audio/Animals/space_dragon_roar.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileDrakeBreathSpread
    capacity: 1
    count: 1

#Projectiles
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: ProjectileDrakeBreath
  name: drakes's breath
  description: Try not to get toasted.
  components:
  - type: PointLight
    color: "#E25822"
    radius: 3.0
    energy: 5.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: fireball
      shader: unshaded
  - type: IgnitionSource
    temperature: 1000
    ignited: true
  - type: RepeatingTrigger
    delay: 0.5 # line of fire as well as if it hits something
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 5 # low intensity, the point is to burn attackers not to break open walls, dragons can just eat them
    intensitySlope: 1
    maxIntensity: 3
    canCreateVacuum: false
    deleteAfterExplosion: false
    repeatable: true
  - type: TimedDespawn
    lifetime: 6

- type: entity
  name: wide laser barrage
  id: ProjectileDrakeBreathSpread
  categories: [ HideSpawnMenu ]
  parent: ProjectileDrakeBreath
  components:
  - type: ProjectileSpread
    proto: ProjectileDrakeBreath
    count: 5 
    spread: 30
  
